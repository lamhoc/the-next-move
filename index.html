<!DOCTYPE html>
<html>
<head>
    <title>The Next Move - Đặt bàn</title>
</head>
<body>
    <h1>Danh sách bàn trống</h1>
    <ul id="list-ban"></ul>

    <script>
        <script>
    fetch('/api/test') // Hoặc /api/ban tùy theo tên bạn đặt trong server.js
        .then(res => res.json())
        .then(response => {
            const list = document.getElementById('list-ban');
            // Vì dữ liệu nằm trong response.data
            const mangBan = response.data; 

            if(!mangBan || mangBan.length === 0) {
                list.innerHTML = "<li>Không có bàn nào trong cơ sở dữ liệu.</li>";
            } else {
                list.innerHTML = ""; // Xóa dòng chữ đang load (nếu có)
                mangBan.forEach(ban => {
                    let li = document.createElement('li');
                    li.style.padding = "10px";
                    li.style.borderBottom = "1px solid #ddd";
                    li.innerHTML = `<strong>${ban.TenBan}</strong> - Trạng thái: <span style="color: green">${ban.TrangThai}</span>`;
                    list.appendChild(li);
                });
            }
        })
        .catch(err => {
            console.error("Lỗi:", err);
            document.getElementById('list-ban').innerHTML = "Lỗi kết nối API!";
        });
</script>
</body>
</html>
