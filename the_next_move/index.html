<!DOCTYPE html>
<html>
<head>
    <title>The Next Move - Đặt bàn</title>
</head>
<body>
    <h1>Danh sách bàn trống</h1>
    <ul id="list-ban"></ul>

    <script>
        fetch('/api/ban')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('list-ban');
                data.forEach(ban => {
                    let li = document.createElement('li');
                    li.textContent = `${ban.TenBan} - ${ban.TrangThai}`;
                    list.appendChild(li);
                });
            });
    </script>
</body>
</html>
